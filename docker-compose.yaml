services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5055:5055"
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`api-confirming.egeadev.cloud`)
      - traefik.http.services.backend.loadbalancer.server.port=5055
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5055/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-confirming.egeadev.cloud}
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "8095:8095"
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`confirming.egeadev.cloud`)
      - traefik.http.services.frontend.loadbalancer.server.port=8095
    networks:
      - coolify

volumes:
  postgres_data:

networks:
  coolify:
    external: true


